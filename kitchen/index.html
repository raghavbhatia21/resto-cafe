<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0f">
    <title>Kitchen Dashboard | DesignE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        :root {
            --bg-dark: #020205;
            --primary-glow: #ff9d00;
            --secondary-glow: #00d2ff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-dim: #888899;
        }

        body {
            background: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(255, 157, 0, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(0, 210, 255, 0.05) 0%, transparent 50%);
            min-height: 100vh;
        }

        /* Minimalist Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 0.6rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.08);
            color: white;
            border-color: rgba(255,255,255,0.2);
        }

        .nav-btn.logout {
            color: var(--accent-red);
        }

        /* Kitchen Grid Layout */
        .kitchen-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        /* Ticket-Style Order Card */
        .order-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .order-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: var(--primary-glow);
            border-radius: 16px 16px 0 0;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.2rem;
        }

        .table-no {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            line-height: 1;
        }

        .order-time {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .order-items {
            list-style: none;
            padding: 0;
            margin: 0 0 1.5rem 0;
        }

        .order-item {
            padding: 0.6rem 0;
            border-bottom: 1px dashed rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            font-weight: 500;
        }

        .item-qty {
            color: var(--primary-glow);
            font-weight: 800;
            margin-right: 0.8rem;
        }

        .order-comment {
            background: rgba(255, 157, 0, 0.1);
            border-left: 3px solid var(--primary-glow);
            padding: 0.8rem;
            border-radius: 4px;
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }

        .btn-main {
            grid-column: 1 / -1;
            background: var(--primary-glow);
            color: black;
            border: none;
            padding: 0.8rem;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-outline {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 0.6rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 10rem 2rem;
            opacity: 0.4;
        }

        /* Responsive Mobile Fixes */
        /* Waiter Call Cards */
        .waiter-card {
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--primary-glow);
        }

        .waiter-card h4 { margin: 0; font-weight: 800; font-size: 1.1rem; }
        .waiter-card p { margin: 0; font-size: 0.85rem; color: var(--text-dim); }
        .resolve-btn {
            background: var(--primary-glow);
            color: black;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.75rem;
            cursor: pointer;
        }

        @media (max-width: 640px) {
            header {
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 1rem 0;
            }
            .header-left {
                align-items: center;
            }
            .logo {
                font-size: 1.2rem;
            }
            .header-right {
                width: 100%;
                justify-content: space-between;
                background: rgba(255,255,255,0.03);
                padding: 0.5rem;
                border-radius: 12px;
            }
            .nav-btn span {
                display: none;
            }
            .nav-btn {
                padding: 0.6rem;
                border: none;
                background: transparent;
            }
            .nav-btn i {
                font-size: 1.25rem;
            }
            /* 2-column compact grid layout on mobile */
            .kitchen-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.8rem;
            }
            .order-card {
                padding: 0.8rem;
                border-radius: 12px;
            }
            .order-header {
                margin-bottom: 0.8rem;
            }
            .table-no {
                font-size: 1.2rem;
            }
            .order-time {
                font-size: 0.65rem;
            }
            .order-items {
                margin-bottom: 0.8rem;
            }
            .order-item {
                padding: 0.4rem 0;
                font-size: 0.8rem;
            }
            .item-qty {
                margin-right: 0.4rem;
            }
            .order-comment {
                padding: 0.5rem;
                font-size: 0.75rem;
                margin-bottom: 0.8rem;
            }
            .action-grid {
                grid-template-columns: 1.2fr 0.8fr;
                gap: 0.4rem;
            }
            .btn-main {
                grid-column: auto;
                font-size: 0.7rem;
                padding: 0.45rem;
                border-radius: 6px;
            }
            .btn-outline {
                font-size: 0.7rem;
                padding: 0.45rem;
                border-radius: 6px;
            }
            .waiter-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.8rem;
            }
            .resolve-btn {
                width: 100%;
            }
        }
    </style>
    <style id="auth-cloak">body { display: none !important; }</style>
</head>

<body>
    <div class="container" style="max-width: 1400px; margin: 0 auto; padding: 0 1.5rem;">
        <header>
            <div class="header-left">
                <h1 class="logo">DESIGNE OPS</h1>
                <span id="order-count-badge"
                    style="background: var(--primary-glow); color: black; font-weight: 900; font-size: 0.9rem; padding: 0.2rem 0.8rem; border-radius: 6px;">0</span>
            </div>
            <div class="header-right">
                <a href="../cashier/" class="nav-btn"><i class="fas fa-cash-register"></i> <span>POS</span></a>
                <a href="../admin/index.html" class="nav-btn"><i class="fas fa-cog"></i> <span>ADMIN</span></a>
                <button id="audio-toggle-btn" onclick="toggleAudio()" class="nav-btn">
                     <i class="fas fa-volume-mute"></i>
                </button>
                <a href="#" onclick="logout()" class="nav-btn logout"><i class="fas fa-power-off"></i></a>
            </div>
        </header>

        <div id="waiter-calls-area" class="waiter-requests-container" style="margin-bottom: 2rem;">
            <!-- Waiter calls will appear here -->
        </div>

        <section id="active-orders-section">
            <h2 style="font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1.5rem;">Running Orders</h2>
            <div id="orders-container" class="kitchen-grid">
                <div class="empty-state">
                    <p>SYSTEM READY — WAITING FOR ORDERS</p>
                </div>
            </div>
        </section>

        <section id="tables-section" style="margin-top: 4rem; border-top: 1px solid var(--glass-border); padding-top: 2rem;">
            <h2 style="font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1.5rem;">Table Status</h2>
            <div id="tables-container" class="kitchen-grid">
                <!-- Tables will be injected here -->
            </div>
        </section>
    </div>

    <!-- License/Suspension Overlay -->
    <div id="license-overlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 99999; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; padding: 2rem; backdrop-filter: blur(10px);">
        <div
            style="background: rgba(255,255,255,0.05); padding: 3rem; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); max-width: 500px; width: 100%;">
            <div style="font-size: 4rem; color: #FF4B2B; margin-bottom: 1.5rem;"><i
                    class="fas fa-exclamation-triangle"></i></div>
            <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 1rem; letter-spacing: -1px;">SERVICE SUSPENDED
            </h2>
            <p id="license-msg" style="color: #a0a0a0; margin-bottom: 2rem; line-height: 1.6;">Your subscription has
                expired or the service has been temporarily disabled. Please contact the administrator to renew.</p>
            <a href="https://wa.me/918949417812"
                style="background: #25D366; color: white; text-decoration: none; padding: 1rem 2rem; border-radius: 12px; font-weight: 700; display: inline-flex; align-items: center; gap: 0.5rem;">
                <i class="fab fa-whatsapp"></i> CONTACT ADMIN
            </a>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/license.js"></script>
    <script>
        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = '../admin/login.html';
            } else {
                const email = user.email || '';
                if (!email) {
                    showAccessDenied("Your account email is missing. Please contact the administrator.");
                    return;
                }
                const emailKey = email.toLowerCase().replace(/\./g, '_');
                
                firebase.database().ref('settings_private/superAdminEmail').once('value').then(emailSnap => {
                    const superAdminEmail = emailSnap.val() ? emailSnap.val().toLowerCase() : '';
                    const userEmail = email.toLowerCase();
                    
                    if (userEmail === superAdminEmail || userEmail === 'raghavbhatia332@gmail.com') {
                        document.getElementById('auth-cloak')?.remove();
                    } else {
                        // Live check whitelisted status
                        firebase.database().ref(`settings_private/staff/${emailKey}`).on('value', staffSnap => {
                            if (staffSnap.exists()) {
                                document.getElementById('auth-cloak')?.remove();
                            } else {
                                showAccessDenied("Your staff authorization has been revoked.");
                            }
                        }, error => {
                            console.error("Staff whitelist listener failed:", error);
                            showAccessDenied("Database access denied. Please verify your permissions.");
                        });
                    }
                }).catch(err => {
                    console.error("Auth validation failed:", err);
                    showAccessDenied("Failed to verify authorization credentials.");
                });
            }
        });

        function showAccessDenied(message) {
            document.getElementById('auth-cloak')?.remove();
            document.body.innerHTML = `
                <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #020205; color: white; font-family: 'Outfit', sans-serif; text-align: center; padding: 2rem; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000;">
                    <div style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); padding: 3rem; border-radius: 24px; max-width: 450px; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.5); backdrop-filter: blur(20px);">
                        <div style="font-size: 4rem; color: #ff4b2b; margin-bottom: 1.5rem;"><i class="fas fa-exclamation-triangle"></i></div>
                        <h2 style="font-weight: 800; margin-bottom: 1rem; font-size: 1.8rem; letter-spacing: -0.5px;">ACCESS DENIED</h2>
                        <p style="color: #888899; margin-bottom: 2rem; line-height: 1.5; font-size: 0.95rem;">${message}</p>
                        <div style="font-size: 0.85rem; color: #ff9d00; font-weight: 600;"><i class="fas fa-spinner fa-spin"></i> Redirecting to login...</div>
                    </div>
                </div>
            `;
            firebase.auth().signOut().then(() => {
                setTimeout(() => {
                    window.location.href = '../admin/login.html';
                }, 3000);
            });
        }
        function logout() {
            firebase.auth().signOut().then(() => window.location.href = '../admin/login.html');
        }
    </script>
    <script src="../js/kitchen.js"></script>
</body>

</html>
